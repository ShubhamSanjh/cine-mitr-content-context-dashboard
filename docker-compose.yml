version: "3.9"

services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cd_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cd_password}
      POSTGRES_DB: ${POSTGRES_DB:-content_dashboard}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cd_user} -d ${POSTGRES_DB:-content_dashboard}"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------- Application (Content-Dashboard v2) ----------
  content-dashboard-v2:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-cd_user}:${POSTGRES_PASSWORD:-cd_password}@db:5432/${POSTGRES_DB:-content_dashboard}
      WORKERS: ${WORKERS:-4}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  pgdata:
